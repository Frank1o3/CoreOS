name: Build CoreOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mkarchiso and dependencies
        run: |
          pacman -Syu --noconfirm archiso mkinitcpio squashfs-tools dosfstools mtools libisoburn xorriso

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Build CoreOS ISO
        run: |
          mkarchiso -v \
            -w /work \
            -o /out \
            -m 'iso' \
            .
        env:
          SOURCE_DATE_EPOCH: ""

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreOS-ISO
          path: /out/*.iso
          retention-days: 7
