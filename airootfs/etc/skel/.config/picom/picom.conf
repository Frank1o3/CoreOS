# CoreOS picom config — Base16 Tomorrow Night compatible
# Backend: glx for smoothness; fallback to xrender if needed
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
use-damage = true;
log-level = "warn";

# ── Opacity (matches alacritty's 0.95) ───────────────────────────────────────
opacity = 0.95;
opacity-rule = [
    "100:class_g = 'i3lock'",
    "100:class_g = 'polybar'",
    "95:class_g = 'Alacritty'",
    "90:class_g = 'dmenu'"
];

# ── Shadows (subtle, matching your #1d1f21 bg) ───────────────────────────────
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.25;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-color = "#1d1f21";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'i3lock'",
    "class_g = 'dmenu'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading (smooth workspace switches) ───────────────────────────────────────
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 8;

# ── Rounded corners (subtle, matches your 2px borders) ───────────────────────
corner-radius = 6;
rounded-corners-exclude = [
    "class_g = 'i3lock'",
    "class_g = 'dmenu'"
];

# ── Avoid conflicts with i3 popups ───────────────────────────────────────────
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.95; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 1; };
    dropdown_menu = { opacity = 1; };
};

# ── GLX-specific tweaks (if backend = "glx") ─────────────────────────────────
glx-no-stencil = true;
glx-copy-from-front = false;